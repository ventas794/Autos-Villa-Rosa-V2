name: autos_villa_rosa_2026
description: "Aplicación de gestión de stock y citas - Autos Villa Rosa 2026"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.12.0

  # Gráficos
  fl_chart: ^0.68.0

  # Internacionalización y fechas
  intl: ^0.20.2

  # Selección de imágenes y archivos
  image_picker: ^1.1.2
  file_picker: ^10.3.2

  # Iconos iOS
  cupertino_icons: ^1.0.8

  # UUID
  uuid: ^4.5.0

  # Generación de PDFs
  pdf: ^3.11.2

  # Manejo de paths y directorios
  path_provider: ^2.1.5

  # Abrir URLs y PDFs
  url_launcher: ^6.3.0

  # Descarga de archivos
  dio: ^5.7.0

  # Abrir archivos descargados
  open_file: ^3.3.2

  # Visor de PDF integrado
  flutter_pdfview: ^1.3.2

  # Feedback visual
  fluttertoast: ^8.2.8

  # Para descarga en web
  http: ^1.6.0
  universal_html: ^2.2.4

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Imágenes de red con caché
  cached_network_image: ^3.4.1

  # Localizaciones
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4   # ← AÑADIDO

# ==================== CONFIGURACIÓN DEL ÍCONO DE LA APP ====================
flutter_icons:
  android: true
  ios: true
  
  # Logo principal
  image_path: "assets/images/logo_avs.png"

  # Configuración Adaptive Icon (Android) - Elimina el fondo blanco con azul
  adaptive_icon_background: "#0053A0"           # ← Color azul de tu app (puedes cambiarlo)
  adaptive_icon_foreground: "assets/images/logo_avs.png"

  # Margen interno del logo (ajusta si queda muy pegado al borde)
  adaptive_icon_foreground_inset: "15%"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/logo_avs.png
    - assets/images/logo_auto1.png
    - assets/images/firma.png
    - assets/fonts/LiberationSans-Regular.ttf
    - assets/fonts/LiberationSans-Bold.ttf